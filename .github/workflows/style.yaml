name: "CI Style & Type"
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Set up uv
        id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true
          activate-environment: true
          cache-dependency-glob: |
            requirements/**/*.txt
            pyproject.toml
            uv.lock
      - name: Install dependencies
        run: uv pip install .[suggested,dev]
      - name: List dependencies
        run: uv pip list
      - name: Run ruff checks
        run: |
          ruff check --output-format=github --no-fix .
          ruff format --diff

  mypy:
    name: ty
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Set up uv
        id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true
          activate-environment: true
          cache-dependency-glob: |
            requirements/**/*.txt
            pyproject.toml
            uv.lock
      - name: Install dependencies
        run: uv pip install .[suggested,dev]
      - name: List dependencies
        run: uv pip list
      - name: Run ty
        run:  ty check .
