name: style (ruff + mypy)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install ruff (via pyproject dev extras if present)
        run: |
          python -m pip install --upgrade pip
          if grep -q "\[project.optional-dependencies\]" pyproject.toml 2>/dev/null; then
            pip install .[dev]
          else
            pip install ruff
          fi

      - name: Run ruff
        run: ruff check .

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install mypy (via pyproject dev extras if present)
        run: |
          python -m pip install --upgrade pip
          if grep -q "\[project.optional-dependencies\]" pyproject.toml 2>/dev/null; then
            pip install .[dev]
          else
            pip install mypy
          fi

      - name: Run mypy
        run: mypy --show-error-codes --pretty --ignore-missing-imports .
