name: style
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Set up uv
        id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true
          activate-environment: true
          cache-dependency-glob: |
            pyproject.toml
            requirements/dev.txt
            uv.lock
      - name: Install dependencies
        run: uv sync --locked --extra suggested --extra dev
      - name: Run ruff checks
        run: |
          ruff check --output-format=github --no-fix .
          ruff format --diff
  ty:
    name: ty
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Set up uv
        id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true
          activate-environment: true
          cache-dependency-glob: |
            pyproject.toml
            requirements/dev.txt
            uv.lock
      - name: Install dependencies
        run: uv sync --locked --extra suggested --extra dev
      - name: Run ty checks
        run: ty check --output-format=github .
