name: style (ruff + mypy)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff (via pyproject dev extras if present)
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          
      - name: Run ruff
        run: ruff check .

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install mypy (via pyproject dev extras if present)
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          
      - name: Run mypy
        run:  mypy --install-types --non-interactive .
