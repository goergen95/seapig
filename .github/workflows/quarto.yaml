name: Render and Deploy Quarto Website

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true
          activate-environment: true
          cache-dependency-glob: |
            requirements/**/*.txt
            pyproject.toml
            uv.lock
      - name: Install dependencies
        run: uv pip install .[all]
      - name: List dependencies
        run: uv pip list
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Render site (Makefile docs sequence)
        run: |
          quarto add machow/quartodoc --no-prompt
          quarto render README.qmd
          python -m quartodoc build --verbose
          python -m quartodoc interlinks
          quarto render --no-cache --output-dir _site
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site/
          publish_branch: gh-pages
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          keep_files: false
