name: CI Docs

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-docs:
    name: "Build Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for accurate page timestamps

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true
          activate-environment: true
          cache-dependency-glob: |
            requirements/**/*.txt
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install .[all]
          uv pip install git+https://github.com/posit-dev/great-docs # until 0.10 is released

      - name: List dependencies
        run: uv pip list

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build docs
        run: great-docs build

      - name: Copy CNAME file
        run: cp CNAME great-docs/_site/CNAME

      - name: Save docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: great-docs/_site

  publish-docs:
    name: "Publish Docs"
    runs-on: ubuntu-latest
    needs: "build-docs"
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: docs-html
          path: great-docs/_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: great-docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
