repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.7
    hooks:
        - id: ruff
          types_or:
            - python
            - jupyter
          args:
            - --fix
        - id: ruff-format
          types_or:
            - python
            - jupyter

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        types: [python]
        args:
          - --install-types
          - --non-interactive
